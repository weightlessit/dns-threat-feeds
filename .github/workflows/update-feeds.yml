name: Update Threat Feeds

on:
  schedule:
    - cron: "* */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-feeds:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests pyyaml

      - name: Run feed converter
        run: python scripts/convert_feeds.py

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain output/)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push updates
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          AG_COUNT=$(grep -rch "^||" output/adguard/ 2>/dev/null | paste -sd+ | bc 2>/dev/null || echo 0)
          FG_DOMAIN=$(wc -l output/fortigate/domains/combined.txt 2>/dev/null | awk '{print $1}' || echo 0)
          FG_IP=$(wc -l output/fortigate/ip/combined.txt 2>/dev/null | awk '{print $1}' || echo 0)
          FG_HASH=$(wc -l output/fortigate/hash/combined.txt 2>/dev/null | awk '{print $1}' || echo 0)
          git commit -m "Update feeds - ${TIMESTAMP} | AG: ${AG_COUNT} | FG domains: ${FG_DOMAIN} IPs: ${FG_IP} hashes: ${FG_HASH}"
          git push
