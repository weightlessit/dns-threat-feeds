name: Update Threat Feeds

on:
  schedule:
    # Run every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-feeds:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests pyyaml

      - name: Run feed converter
        run: python scripts/convert_feeds.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet output/ && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push updates
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          RULE_COUNT=$(grep -rch "^||" output/ | paste -sd+ | bc)
          git commit -m "Update threat feeds - ${TIMESTAMP} - ${RULE_COUNT} rules"
          git push
