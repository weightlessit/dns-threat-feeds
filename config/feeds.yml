# ======================================================================
# DNS Threat Feeds -- Feed Configuration
# ======================================================================
#
# Three categories of feeds:
#
#   domain_feeds  -- domain/FQDN threat intelligence
#                    Output: AdGuard Home + FortiGate
#
#   ip_feeds      -- IP address threat intelligence
#                    Output: FortiGate ONLY
#
#   hash_feeds    -- Malware file hash threat intelligence
#                    Output: FortiGate ONLY (Malware Hash connector)
#
# Supported types:
#   domain_feeds: domain | hosts | url | adguard | phishtank_csv
#   ip_feeds:     ip
#   hash_feeds:   hash
# ======================================================================

domain_feeds:

  # -- abuse.ch --------------------------------------------------------
  - name: URLhaus Malware Domains (hostfile)
    url: https://urlhaus.abuse.ch/downloads/hostfile/
    type: hosts
    output: urlhaus-hostfile-domains
    description: >-
      Malware distribution domains from abuse.ch URLhaus
      (hosts-file format, updated every 5 minutes)

  - name: URLhaus Recent URLs
    url: https://urlhaus.abuse.ch/downloads/text_recent/
    type: url
    output: urlhaus-recent-domains
    description: >-
      Domains extracted from recently reported malicious URLs
      tracked by abuse.ch URLhaus

  - name: ThreatFox IOC Domains
    url: https://threatfox.abuse.ch/downloads/hostfile/
    type: hosts
    output: threatfox-domains
    description: >-
      Indicators of compromise (domain-based) from abuse.ch
      ThreatFox covering C2 and payload delivery

  # -- Phishing --------------------------------------------------------
  - name: Phishing Army Extended
    url: https://phishing.army/download/phishing_army_blocklist_extended.txt
    type: domain
    output: phishing-army-domains
    description: >-
      Aggregated phishing domain blocklist from Phishing Army
      (extended version with broader coverage)

  - name: OpenPhish Community Feed
    url: https://openphish.com/feed.txt
    type: url
    output: openphish-domains
    description: >-
      Community phishing URL feed from OpenPhish
      (domains extracted from full URLs)

  - name: PhishTank Verified Phishing
    url: http://data.phishtank.com/data/online-valid.csv
    type: phishtank_csv
    output: phishtank-domains
    description: >-
      Verified active phishing domains from PhishTank

  # -- CERTs and Research ----------------------------------------------
  - name: CERT Polska Malicious Domains
    url: https://hole.cert.pl/domains/domains.txt
    type: domain
    output: cert-polska-domains
    description: >-
      Malicious domains from the Polish national CERT (NASK)

  - name: CyberHost Malware and Phishing
    url: https://lists.cyberhost.uk/malware_domains_only.txt
    type: domain
    output: cyberhost-malware-domains
    description: >-
      Verified malware and phishing domains from CyberHost,
      updated multiple times daily (~37K domains)

  - name: Disconnect Malvertising
    url: https://s3.amazonaws.com/lists.disconnect.me/simple_malvertising.txt
    type: domain
    output: disconnect-malvertising
    description: >-
      Malvertising distribution domains from Disconnect.me

  - name: StopForumSpam Toxic Domains
    url: https://www.stopforumspam.com/downloads/toxic_domains_whole.txt
    type: domain
    output: stopforumspam-toxic
    description: >-
      Spam and scam domains used in forum-based attacks
      from StopForumSpam

  # -- Pre-formatted AdGuard lists (passthrough) -----------------------
  - name: Block List Project - Malware
    url: https://blocklistproject.github.io/Lists/adguard/malware-ags.txt
    type: adguard
    output: blp-malware
    description: >-
      Malware domains from The Block List Project (AdGuard format)

  - name: Block List Project - Phishing
    url: https://blocklistproject.github.io/Lists/adguard/phishing-ags.txt
    type: adguard
    output: blp-phishing
    description: >-
      Phishing domains from The Block List Project (AdGuard format)

  - name: Block List Project - Ransomware
    url: https://blocklistproject.github.io/Lists/adguard/ransomware-ags.txt
    type: adguard
    output: blp-ransomware
    description: >-
      Ransomware domains from The Block List Project (AdGuard format)

  - name: HaGeZi Threat Intelligence Feeds
    url: https://raw.githubusercontent.com/hagezi/dns-blocklists/main/adblock/tif.txt
    type: adguard
    output: hagezi-tif
    description: >-
      HaGeZi curated threat intelligence feed covering malware,
      cryptojacking, scam, spam, and phishing domains


ip_feeds:

  # -- IP-based feeds (FortiGate only) ---------------------------------
  - name: ET Compromised IPs
    url: https://rules.emergingthreats.net/blockrules/compromised-ips.txt
    type: ip
    output: et-compromised-ips
    description: >-
      Compromised IP addresses from Proofpoint Emerging Threats

  - name: Feodo Tracker Botnet C2 IPs
    url: https://feodotracker.abuse.ch/downloads/ipblocklist.txt
    type: ip
    output: feodo-tracker-ips
    description: >-
      Botnet command-and-control server IPs from abuse.ch Feodo Tracker

  - name: Spamhaus DROP
    url: https://www.spamhaus.org/drop/drop.txt
    type: ip
    output: spamhaus-drop
    description: >-
      Spamhaus Don't Route Or Peer list -- hijacked IP ranges
      (EDROP has been merged into this list)

  - name: Blocklist.de All Attackers
    url: https://lists.blocklist.de/lists/all.txt
    type: ip
    output: blocklist-de-all
    description: >-
      IPs detected attacking services (SSH, mail, web) by blocklist.de

  - name: CINSscore Bad IPs
    url: https://cinsscore.com/list/ci-badguys.txt
    type: ip
    output: cinsscore-badguys
    description: >-
      Collective Intelligence Network Security threat IP list

  - name: Binary Defense Ban List
    url: https://www.binarydefense.com/banlist.txt
    type: ip
    output: binarydefense-banlist
    description: >-
      Artillery honeypot threat intelligence ban list from Binary Defense

  - name: ThreatHive Blocklist
    url: https://threathive.net/hiveblocklist.txt
    type: ip
    output: threathive
    description: >-
      140K malicious IPs from honeypot telemetry and OSINT,
      updated every 15 minutes (threathive.net)

  - name: OpenDBL IPSum Level 3
    url: https://opendbl.net/lists/ipsum3.list
    type: ip
    output: opendbl-ipsum3
    description: >-
      IPs appearing on 3 or more independent blacklists --
      high confidence, low false positive (opendbl.net)

  - name: OpenDBL ET Known Compromised
    url: https://opendbl.net/lists/etknown.list
    type: ip
    output: opendbl-etknown
    description: >-
      Emerging Threats known compromised hosts, pre-formatted
      for firewall ingestion (opendbl.net)

  - name: OpenDBL BruteforceBlocker
    url: https://opendbl.net/lists/bruteforce.list
    type: ip
    output: opendbl-bruteforce
    description: >-
      SSH and service brute-force attacker IPs (opendbl.net)

  - name: OpenDBL DShield
    url: https://opendbl.net/lists/dshield.list
    type: ip
    output: opendbl-dshield
    description: >-
      SANS DShield top attacking subnets, optimized for
      firewall ingestion (opendbl.net)

  - name: Bitwire Outbound Blocklist
    url: https://raw.githubusercontent.com/bitwire-it/ipblocklist/main/outbound.txt
    type: ip
    output: bitwire-outbound
    description: >-
      C2 servers, botnet controllers, malware drop sites, and
      phishing hosts -- for outbound traffic blocking (updated 2h)

  - name: Bitwire Inbound Blocklist
    url: https://raw.githubusercontent.com/bitwire-it/ipblocklist/main/inbound.txt
    type: ip
    output: bitwire-inbound
    description: >-
      Scanners, brute-force, spam sources, and web exploits --
      for inbound traffic blocking (updated 2h)

  # -- Requires API key (uncomment and set key to enable) --------------
  # - name: AbuseIPDB Blacklist
  #   url: https://api.abuseipdb.com/api/v2/blacklist?plaintext=true&key=YOUR_API_KEY
  #   type: ip
  #   output: abuseipdb-blacklist
  #   description: >-
  #     Top abusive IPs from AbuseIPDB (requires free API key from
  #     https://www.abuseipdb.com -- replace YOUR_API_KEY above)


hash_feeds:

  # -- Malware hash feeds (FortiGate only) -----------------------------
  # FortiGate ingests these via Security Fabric > External Connectors >
  # Threat Feeds > Malware Hash. Each line: <hex_hash> [description]
  # Use ONE hash type per feed (do not mix MD5/SHA1/SHA256).

  - name: romainmarcoux Malicious SHA256
    url: https://raw.githubusercontent.com/romainmarcoux/malicious-hash/main/full-hash-sha256-aa.txt
    type: hash
    output: romainmarcoux-sha256
    description: >-
      Aggregated malicious SHA256 hashes from multiple sources
      (bazaar.abuse.ch, urlhaus, alienvault, etc). Updated daily.
      71K hashes, built specifically for FortiGate ingestion.

  # -- Requires auth key (uncomment and set key to enable) -------------
  # abuse.ch now requires authentication for data exports.
  # Get a free auth key at https://auth.abuse.ch/
  #
  # - name: MalwareBazaar Recent SHA256
  #   url: https://bazaar.abuse.ch/export/txt/sha256/recent/
  #   type: hash
  #   output: malwarebazaar-sha256
  #   headers:
  #     Auth-Key: YOUR_AUTH_KEY
  #   description: >-
  #     Recently submitted malware SHA256 hashes from abuse.ch
  #     MalwareBazaar (requires free auth key from https://auth.abuse.ch)
